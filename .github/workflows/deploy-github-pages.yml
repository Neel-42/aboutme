# Publishes your portfolio (portfolio/) + the React atlas under /atlas/
# Repo → Settings → Pages → Source: GitHub Actions (enable on first run)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Vite base path for /atlas/ on Pages
        id: base
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_LC="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          if [ "$REPO_LC" = "${OWNER_LC}.github.io" ]; then
            echo "vite_base=/atlas/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/${REPO_LC}/atlas/" >> "$GITHUB_OUTPUT"
          fi

      - run: npx vite build --base "${{ steps.base.outputs.vite_base }}"

      - name: Assemble portfolio + atlas
        run: |
          mkdir -p _site/atlas
          cp -r dist/* _site/atlas/
          cp portfolio/index.html portfolio/styles.css _site/
          test -f portfolio/images/western-albemarle.jpg
          test -f portfolio/images/scott-stadium-uva.jpg
          mkdir -p _site/images
          cp -R portfolio/images/. _site/images/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
